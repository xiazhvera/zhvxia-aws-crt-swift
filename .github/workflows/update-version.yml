name: Update Version on Release

# This workflow automatically updates the CRTVersion in CommonRuntimeKit.swift when a new release is created.
# It extracts the version from the tag (e.g., v0.61.0 -> 0.61.0), updates the source file,
# and moves the tag to point to the new commit with the updated version.
# The original release title and body are preserved when recreating the release.

on:
  release:
    types: [published]  # Triggers when a release is published via GitHub UI

permissions:
  contents: read       # Required to push commits, tags, and manage releases

env:
  AWS_REGION: us-east-1

jobs:
  update-version:
    runs-on: ubuntu-latest
    environment: DEPLOY_KEY_PRIVATE
    steps:
      - name: Setup SSH with deploy key
        run: |
          # Write the deploy key to a temp file
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ vars.DEPLOY_KEY_ENV }}" | tr -d '\r' | sed 's/^[[:space:]]*//' > ~/.ssh/deploy_key
          # Ensure file ends with a newline (required by OpenSSH)
          chmod 600 ~/.ssh/deploy_key

          # Trust GitHub's host key
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Point git at the key file directly — no agent or passphrase prompt needed
          echo "GIT_SSH_COMMAND=ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" >> $GITHUB_ENV

      - name: Verify deploy key works
        run: |
          echo "=== Key file size (0 bytes = secret is empty or not accessible) ==="
          wc -c < ~/.ssh/deploy_key

          echo "=== First line of key ==="
          head -1 ~/.ssh/deploy_key

          # Abort early with a clear message if the file is empty or too small to be a key
          KEY_SIZE=$(wc -c < ~/.ssh/deploy_key)
          if [ "$KEY_SIZE" -lt 100 ]; then
            echo "❌ DEPLOY_KEY secret appears to be empty or missing."
            echo "   Check that the secret named 'DEPLOY_KEY' exists under:"
            echo "   Settings → Environments → DEPLOY_KEY_PRIVATE → Environment secrets"
            echo "   The value must be the full private key including the BEGIN/END header lines."
            exit 1
          fi

          echo "=== Key fingerprint ==="
          ssh-keygen -lf ~/.ssh/deploy_key

          echo "=== Public key derived from private key (compare this to your repo's deploy key) ==="
          ssh-keygen -yf ~/.ssh/deploy_key

          echo "=== Testing SSH connection to GitHub (verbose) ==="
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -vT git@github.com 2>&1 || true
          SSH_EXIT=$?
          if [ $SSH_EXIT -eq 255 ]; then
            echo "❌ SSH authentication FAILED — the public key above does NOT match any deploy key registered at:"
            echo "   https://github.com/${{ github.repository }}/settings/keys"
            exit 1
          else
            echo "✅ SSH authentication succeeded"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Configure git to use SSH remote
        run: |
          git remote set-url origin git@github.com:${{ github.repository }}.git

      - name: Extract version from tag
        id: get_version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          # Remove the 'v' prefix to get the version
          VERSION=${TAG_NAME#v}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION from tag: $TAG_NAME"

      - name: Update CRTVersion in CommonRuntimeKit.swift
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          VERSION_FILE="Source/AwsCommonRuntimeKit/CommonRuntimeKit.swift"

          # Update the CRTVersion in CommonRuntimeKit.swift
          sed -i "s/public static let CRTVersion = \".*\"/public static let CRTVersion = \"$VERSION\"/" "$VERSION_FILE"

          # Verify the update
          echo "Updated $VERSION_FILE:"
          cat "$VERSION_FILE"

          if grep -q "public static let CRTVersion = \"$VERSION\"" "$VERSION_FILE"; then
            echo "✅ CRTVersion successfully updated to $VERSION"
          else
            echo "❌ Failed to update CRTVersion"
            exit 1
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected (version may already be up to date)"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
            git diff
          fi

      - name: Commit and push directly to main, then recreate release
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TITLE: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG_NAME="${{ steps.get_version.outputs.tag }}"

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Commit the version update directly on main
          git add Source/AwsCommonRuntimeKit/CommonRuntimeKit.swift
          git commit -m "chore: update CRTVersion to $VERSION"

          # Push directly to main
          git push origin main

          echo "✅ Pushed version update to main"

          # Delete the old release (required before we can delete the tag)
          echo "Deleting old release..."
          gh release delete "$TAG_NAME" --yes

          # Delete the old tag (remotely; local tag may not exist since we checked out main)
          git tag -d "$TAG_NAME" || true
          git push origin --delete "$TAG_NAME"

          # Create a new annotated tag pointing to the new commit
          if [ -n "$RELEASE_BODY" ]; then
            git tag -a "$TAG_NAME" -m "$RELEASE_BODY"
          else
            git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          fi
          git push origin "$TAG_NAME"

          # Recreate the release with the original title and body
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          TITLE="${RELEASE_TITLE:-$TAG_NAME}"

          gh release create "$TAG_NAME" \
            --title "$TITLE" \
            --notes "$RELEASE_BODY" \
            $PRERELEASE_FLAG

          echo "✅ CRTVersion updated to $VERSION, tag $TAG_NAME moved to new commit, and release recreated"